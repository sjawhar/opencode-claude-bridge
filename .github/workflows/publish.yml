name: publish

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version:
    name: Determine version
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          set -euo pipefail
          # Find the latest version tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags yet — first release uses current package.json version
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "First release: v$VERSION"
            exit 0
          fi

          # Get commits since last tag
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --format='%s')

          if [ -z "$COMMITS" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No commits since $LATEST_TAG"
            exit 0
          fi

          # Classify conventional commits
          MAJOR=false
          MINOR=false
          PATCH=false

          while IFS= read -r msg; do
            # BREAKING: feat!:, fix(scope)!:, or body contains BREAKING CHANGE
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
              MAJOR=true
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              MINOR=true
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              PATCH=true
            fi
          done <<< "$COMMITS"

          if ! $MAJOR && ! $MINOR && ! $PATCH; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No version-bumping commits since $LATEST_TAG"
            exit 0
          fi

          # Parse version from last tag
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r major minor patch <<< "$CURRENT"

          if $MAJOR; then
            major=$((major + 1)); minor=0; patch=0
          elif $MINOR; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          VERSION="${major}.${minor}.${patch}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $VERSION"

  publish:
    name: Publish to npm
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build
        run: bun run build

      - name: Check if version already published
        id: check
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          if npm view "@sjawhar/opencode-claude-bridge@${VERSION}" version >/dev/null 2>&1; then
            echo "@sjawhar/opencode-claude-bridge@${VERSION} is already published; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: false

      - name: Commit, tag, and push
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"
